title = SolarQuant Anomaly Detection
desc = Forward datum to a SolarQuant anomaly detection service and post prediction results back to SolarNetwork.

status.key = Status
status.desc = Current service status.

containerImage.key = Docker Image
containerImage.desc = Docker image to pull and run (e.g. <code>ghcr.io/ecosuite/solar-predictor:latest</code>). \
	Leave empty to connect to an existing service at the configured Service URL.

serviceUrl.key = Service URL
serviceUrl.desc = The base URL of the SolarQuant anomaly detection HTTP service, e.g. <code>http://localhost:8000</code>. \
	When a Docker Image is configured this is set automatically.

sourceIdRegexValue.key = Source ID Filter
sourceIdRegexValue.desc = A regular expression to match the source IDs of datums to forward to the service. \
	Only matching datums will be sent. For example <code>.*/INV/.*|.*/PYR/.*</code> to match \
	inverter and pyranometer sources.

uploadSourceId.key = Upload Source ID
uploadSourceId.desc = Base source ID path for prediction datums uploaded to SolarNetwork. Each prediction's \
	<code>sourceIndex</code> metadata value is appended (e.g. <code>/solarquant</code> becomes \
	<code>/solarquant/1</code>, <code>/solarquant/2</code>, etc.).

flushIntervalSecs.key = Flush Interval
flushIntervalSecs.desc = The interval, in seconds, at which buffered datums are flushed to the \
	SolarQuant service.

connectionTimeoutMs.key = Connection Timeout
connectionTimeoutMs.desc = The HTTP connection timeout, in milliseconds.

readTimeoutMs.key = Read Timeout
readTimeoutMs.desc = The HTTP read timeout, in milliseconds.

dockerCommand.key = Docker Command
dockerCommand.desc = Path to the SolarQuant Docker management script.
